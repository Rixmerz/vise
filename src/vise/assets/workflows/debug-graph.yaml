# Universal Debug Workflow v2.0
# Multi-strategy debugging: tests, FlowTrace, profiling, hybrid
# Flow: understand -> reproduce -> classify -> [strategy] -> analyze -> hypothesize -> fix -> verify -> report

metadata:
  name: "Universal Debug"
  description: "Multi-strategy debugging. Classifies the bug, selects the optimal tool (tests, FlowTrace, profiling, hybrid), and runs an evidence-based debug cycle."
  version: "2.0.0"
  type: "graph"
  author: "AgentCockpit"
  target_model: "sonnet"
  mcps_required: []

nodes:
  # ---------------------------------------------------------------------------
  # PHASE 1: UNDERSTAND THE PROBLEM
  # ---------------------------------------------------------------------------
  - id: "understand"
    name: "Understand the Problem"
    is_start: true
    model: sonnet
    mcps_enabled: []
    tools_blocked:
      - "Write"
      - "Edit"
      - "Bash"
      - "Task"
    max_visits: 10
    prompt_injection: |
      ======================================================================
      PHASE 1: UNDERSTAND THE PROBLEM
      ======================================================================

      Before touching ANYTHING, understand the problem completely.

      STEPS:
      1. Read the bug report or the user's problem description
      2. Identify the concrete SYMPTOMS (what fails, when, how)
      3. Read the relevant source code (Read, Glob, Grep)
      4. Identify the execution paths involved
      5. Form a specific QUESTION: "Why does X do Y when it should do Z?"

      Do NOT modify anything. Only read and understand.

      SIGNAL: When the question is clear, say "problem understood"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 2: REPRODUCE THE BUG
  # ---------------------------------------------------------------------------
  - id: "reproduce"
    name: "Reproduce the Bug"
    model: sonnet
    mcps_enabled: []
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 10
    prompt_injection: |
      ======================================================================
      PHASE 2: REPRODUCE THE BUG
      ======================================================================

      Confirm the bug exists BEFORE investigating.

      DETECT STACK:
      - Cargo.toml -> cargo test
      - package.json -> npm test / npx vitest / npx jest
      - go.mod -> go test ./...
      - pyproject.toml / setup.py -> pytest
      - *.csproj -> dotnet test
      - Gemfile -> bundle exec rspec

      STEPS:
      1. Detect the tech stack (look for Cargo.toml, package.json, go.mod, etc.)
      2. Find existing tests related to the bug (Glob, Grep)
      3. Run relevant tests with Bash:
         - If specific tests exist: run only those
         - If no tests exist: run the full test suite
         - If no test framework: try to reproduce manually with Bash
      4. Confirm that at least one test fails or that the incorrect behavior
         is observable in the output

      IMPORTANT: Write and Edit are blocked. You only OBSERVE.
      Bash is available for running tests — running tests is observation.

      SIGNAL:
      - If the bug reproduces: "bug reproduced"
      - If you cannot reproduce it: "bug not reproducible"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 2b: BUG NOT REPRODUCIBLE (END)
  # ---------------------------------------------------------------------------
  - id: "unreproducible"
    name: "Bug Not Reproducible"
    is_end: true
    model: sonnet
    mcps_enabled: []
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 3
    prompt_injection: |
      ======================================================================
      BUG NOT REPRODUCIBLE
      ======================================================================

      The bug could not be reproduced. Generate a report with:

      ## Report: Bug Not Reproducible
      - **Reported symptoms**: [what the user said]
      - **Reproduction attempts**: [which tests you ran, what you observed]
      - **Possible reasons**:
        - Dependency on external state (DB, API, cache)
        - Race condition (intermittent)
        - Environment difference (OS, version, config)
        - Bug already fixed in the current version
      - **Suggestions**:
        - Ask the user for more context (exact steps, environment)
        - Add temporary logging in the suspect area
        - Try with specific input data from the report

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 3: CLASSIFY BUG TYPE
  # ---------------------------------------------------------------------------
  - id: "classify"
    name: "Classify Bug"
    model: sonnet
    mcps_enabled: []
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 5
    prompt_injection: |
      ======================================================================
      PHASE 3: CLASSIFY BUG TYPE
      ======================================================================

      Based on the symptoms and the reproduction, classify the bug.

      CATEGORIES:
      1. SERIALIZATION/DATA: Corrupt data, incorrect parsing, roundtrip fails,
         schema mismatch, encoding, serde errors
         -> Strategy: targeted tests

      2. LOGIC/FLOW: Incorrect result, wrong branch, off-by-one,
         inconsistent state, missing early return
         -> Strategy: targeted tests

      3. PERFORMANCE: Slow, timeout, excessive CPU/memory use,
         N+1 queries, hot loops
         -> Strategy: FlowTrace profiling (or native)

      4. INTEGRATION: Failure between services, broken API contract,
         missing headers, auth issues
         -> Strategy: FlowTrace tracing (or request replay)

      5. CONCURRENCY: Race condition, deadlock, intermittent corrupt data,
         non-deterministic ordering
         -> Strategy: stress tests + instrumentation

      6. MEMORY: Leak, use-after-free, stack overflow, OOM,
         unbounded growth
         -> Strategy: sanitizers + profiling

      Analyze the evidence from the reproduction phase and select ONE category.

      SIGNAL: Say exactly one of these phrases:
      - "serialization bug"
      - "logic bug"
      - "performance bug"
      - "integration bug"
      - "concurrency bug"
      - "memory bug"

      ======================================================================

  # ---------------------------------------------------------------------------
  # STRATEGY A: TARGETED TESTS (serialization, logic)
  # ---------------------------------------------------------------------------
  - id: "strategy-tests"
    name: "Strategy: Targeted Tests"
    model: sonnet
    mcps_enabled: []
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 15
    prompt_injection: |
      ======================================================================
      STRATEGY: TARGETED TESTS
      ======================================================================

      For serialization/data and logic/flow bugs, tests are the most
      effective tool.

      FOR SERIALIZATION/DATA:
      - Run roundtrip tests: serialize -> deserialize -> compare
      - Test edge cases: empty, null, unicode, max values, nested structures
      - Verify schema compliance against the real data
      - Run with verbose output to see intermediate values

      FOR LOGIC/FLOW:
      - Run unit tests for the affected module
      - Add a filter to run only relevant tests:
        cargo test [test_name]
        npx jest --testNamePattern="[pattern]"
        pytest -k "[pattern]"
      - Observe return VALUES, not just pass/fail
      - Run with verbose flags:
        cargo test -- --nocapture
        npx jest --verbose
        pytest -v -s

      COLLECT:
      - Full output of failing tests
      - Expected values vs actual values
      - Error stack traces
      - Patterns in the failures (do they all fail at the same point?)

      Write and Edit are blocked. You only observe and collect data.

      SIGNAL: When you have enough observations, say "observations collected"

      ======================================================================

  # ---------------------------------------------------------------------------
  # STRATEGY B: FLOWTRACE / PROFILING (performance, integration)
  # ---------------------------------------------------------------------------
  - id: "strategy-flowtrace"
    name: "Strategy: FlowTrace / Profiling"
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 20
    prompt_injection: |
      ======================================================================
      STRATEGY: FLOWTRACE / PROFILING
      ======================================================================

      For performance and integration bugs, you need to observe the
      runtime behavior.

      IMPORTANT: FlowTrace is NOT a direct MCP. Access it via vise:
      ```
      execute_mcp_tool(
        mcp_name="flowtrace",
        tool_name="flowtrace_detect",
        arguments={"projectPath": "/path/to/project"}
      )
      ```
      Tool names use underscores: flowtrace_detect, flowtrace_init,
      log_open, log_search, dashboard_bottlenecks, etc.

      IF FLOWTRACE AVAILABLE and language supported (Node.js, Java, Python):
      1. execute_mcp_tool("flowtrace", "flowtrace_detect", {projectPath}) -> language
      2. execute_mcp_tool("flowtrace", "flowtrace_init", {projectPath, autoYes: true})
      3. execute_mcp_tool("flowtrace", "flowtrace_cleanup", {projectPath})
      4. execute_mcp_tool("flowtrace", "flowtrace_build", {projectPath})
      5. execute_mcp_tool("flowtrace", "flowtrace_execute", {projectPath})
      6. execute_mcp_tool("flowtrace", "log_open", {path: "flowtrace.jsonl"})
      7. For PERFORMANCE:
         - execute_mcp_tool("flowtrace", "dashboard_bottlenecks", {path, top: 10})
         - execute_mcp_tool("flowtrace", "log_aggregate", {sessionId, groupBy, metric})
         - execute_mcp_tool("flowtrace", "log_topK", {sessionId, byField, k: 20})
      8. For INTEGRATION:
         - execute_mcp_tool("flowtrace", "log_timeline", {sessionId, filter})
         - execute_mcp_tool("flowtrace", "log_flow", {sessionId, keys})
         - execute_mcp_tool("flowtrace", "log_errors", {sessionId})

      IF FLOWTRACE NOT AVAILABLE or language not supported:
      - Rust: cargo bench, flamegraph, criterion
      - Go: go test -bench, pprof
      - Node.js: --prof, clinic.js
      - Python: cProfile, py-spy
      - General: time, strace, ltrace
      - Run native profilers with Bash

      COLLECT:
      - Duration metrics per method/function
      - Bottlenecks with impact score
      - Error patterns in traces
      - Event timeline for integration

      SIGNAL: When you have enough observations, say "observations collected"

      ======================================================================

  # ---------------------------------------------------------------------------
  # STRATEGY C: HYBRID (concurrency, memory)
  # ---------------------------------------------------------------------------
  - id: "strategy-hybrid"
    name: "Strategy: Hybrid (Tests + Instrumentation)"
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 20
    prompt_injection: |
      ======================================================================
      STRATEGY: HYBRID (Tests + Instrumentation)
      ======================================================================

      For concurrency and memory bugs, combine stress tests with
      instrumentation.

      IMPORTANT: FlowTrace is NOT a direct MCP. Access it via vise:
      ```
      execute_mcp_tool(
        mcp_name="flowtrace",
        tool_name="<tool_name>",
        arguments={...}
      )
      ```

      FOR CONCURRENCY:
      - Run tests with sanitizers:
        RUSTFLAGS="-Z sanitizer=thread" cargo test
        go test -race ./...
        python -X faulthandler script.py
      - Stress tests: run the same test N times looking for intermittency
        cargo test [name] -- --test-threads=1
        for i in {1..100}; do cargo test [name]; done
      - If FlowTrace available (via execute_mcp_tool):
        execute_mcp_tool("flowtrace", "log_timeline", {sessionId, filter})
        execute_mcp_tool("flowtrace", "log_flow", {sessionId, keys: ["thread"]})

      FOR MEMORY:
      - Run with sanitizers:
        RUSTFLAGS="-Z sanitizer=address" cargo test
        valgrind --tool=memcheck ./target/debug/test
        node --max-old-space-size=256 script.js
      - Look for growth patterns:
        Run the test several times, observe RSS with ps/top
      - If FlowTrace available (via execute_mcp_tool):
        execute_mcp_tool("flowtrace", "log_aggregate", {sessionId, groupBy, metric})
        execute_mcp_tool("flowtrace", "dashboard_analyze", {path})

      COLLECT:
      - Sanitizer output (errors, warnings)
      - Intermittent failure patterns (1 in N runs)
      - Memory metrics (RSS, heap, allocations)
      - Timeline of concurrent events

      SIGNAL: When you have enough observations, say "observations collected"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 5: ANALYZE DATA
  # ---------------------------------------------------------------------------
  - id: "analyze"
    name: "Analyze Data"
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 20
    prompt_injection: |
      ======================================================================
      PHASE 5: ANALYZE DATA
      ======================================================================

      Analyze the data collected from the previous strategy.
      Look for EVIDENCE, not assumptions.

      TEST DATA:
      - Which tests failed and which passed?
      - Expected vs actual values — where do they diverge?
      - Is there a common pattern in the failures?
      - What function/line does the stack trace point to?

      FLOWTRACE DATA (via execute_mcp_tool):
      - execute_mcp_tool("flowtrace", "log_search", {sessionId, filter})
      - execute_mcp_tool("flowtrace", "log_aggregate", {sessionId, groupBy, metric})
      - execute_mcp_tool("flowtrace", "log_flow", {sessionId, keys})
      - execute_mcp_tool("flowtrace", "dashboard_bottlenecks", {path, top})

      PROFILING DATA:
      - Where is the execution time concentrated?
      - Are there excessive allocations?
      - Did the sanitizers report errors?

      If you need MORE DATA, you can run more tests or queries with Bash.

      Present a summary of the DATA found, not opinions.

      SIGNAL: When you have enough data, say "analysis complete"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 6: FORM HYPOTHESIS
  # ---------------------------------------------------------------------------
  - id: "hypothesize"
    name: "Form Hypothesis"
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 10
    prompt_injection: |
      ======================================================================
      PHASE 6: FORM HYPOTHESIS
      ======================================================================

      Based on the collected DATA, form a specific hypothesis.

      FORMAT:
      1. OBSERVATION: What does the data show?
         - Cite specific data (test output, traces, metrics)
      2. HYPOTHESIS: What is the root cause?
         - "Method X in file Y returns Z instead of W because..."
      3. PREDICTION: If my hypothesis is correct, what should change?
         - "If I fix X, test Y should pass"
      4. PROPOSED FIX: Exactly which lines of which file to modify

      You can run more tests or queries to validate your hypothesis.

      Do NOT modify code yet.

      SIGNAL:
      - If the hypothesis is clear: "hypothesis formed"
      - If you need more data: "need more data"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 7: IMPLEMENT FIX
  # ---------------------------------------------------------------------------
  - id: "fix"
    name: "Implement Fix"
    model: sonnet
    mcps_enabled:
      - "*"
    max_visits: 30
    validators:
      - type: tests_pass
        weight: 1.0
    prompt_injection: |
      ======================================================================
      PHASE 7: IMPLEMENT FIX
      ======================================================================

      Apply the surgical fix based on your hypothesis.

      RULES:
      - Modify ONLY the files and lines identified in the hypothesis
      - Do no additional refactoring
      - Do not add console.logs or debug prints
      - Every change must be justified by evidence

      You have access to ALL tools (Write, Edit, Bash, etc).

      SIGNAL: When the fix is implemented, say "fix implemented"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 8: VERIFY FIX
  # ---------------------------------------------------------------------------
  - id: "verify"
    name: "Verify Fix"
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Write"
      - "Edit"
      - "Task"
    max_visits: 15
    prompt_injection: |
      ======================================================================
      PHASE 8: VERIFY FIX
      ======================================================================

      Verify the fix works by running the same tests/observations.

      VERIFICATION WITH TESTS (always):
      1. Re-run the tests that failed in the reproduction phase
      2. Run the full test suite to check for regressions
      3. The tests that failed before must now PASS
      4. No new test must FAIL

      VERIFICATION WITH FLOWTRACE (if used, via execute_mcp_tool):
      1. execute_mcp_tool("flowtrace", "flowtrace_cleanup", {projectPath})
      2. execute_mcp_tool("flowtrace", "flowtrace_build", {projectPath})
      3. execute_mcp_tool("flowtrace", "flowtrace_execute", {projectPath})
      4. execute_mcp_tool("flowtrace", "log_open", {path})
      5. execute_mcp_tool("flowtrace", "log_errors", {sessionId})
      6. Compare metrics before/after

      CRITERIA:
      - The original error does NOT appear
      - No new errors/failures were introduced
      - Performance did not get worse (if applicable)

      SIGNAL:
      - If verification PASSES: "verification passed"
      - If verification FAILS: "verification failed"

      ======================================================================

  # ---------------------------------------------------------------------------
  # PHASE 9: REPORT
  # ---------------------------------------------------------------------------
  - id: "report"
    name: "Generate Debug Report"
    is_end: true
    model: sonnet
    mcps_enabled:
      - "vise"
    tools_blocked:
      - "Edit"
      - "Task"
    max_visits: 5
    prompt_injection: |
      ======================================================================
      PHASE 9: DEBUG REPORT
      ======================================================================

      Generate a concise report of the debug performed.

      FORMAT:
      ## Bug Report
      - **Bug type**: [serialization|logic|performance|concurrency|integration|memory]
      - **Strategy used**: [tests|flowtrace|hybrid]
      - **Symptoms**: [what the user reported]
      - **Root cause**: [identified by the evidence]
      - **Evidence**: [specific data: test output, traces, metrics]
      - **Fix applied**: [files and lines modified]
      - **Verification**: [tests that passed, before/after comparison]

      Optionally:
      - flowtrace.cleanup to clean up the debug logs
      - Suggest additional regression tests

      ======================================================================

# =============================================================================
# EDGES - Transitions (15)
# =============================================================================

edges:
  # understand -> reproduce
  - id: "understand-to-reproduce"
    from: "understand"
    to: "reproduce"
    condition:
      type: "phrase"
      phrases:
        - "problem understood"
    priority: 1

  # reproduce -> classify (bug reproduced)
  - id: "reproduce-to-classify"
    from: "reproduce"
    to: "classify"
    condition:
      type: "phrase"
      phrases:
        - "bug reproduced"
    priority: 1

  # reproduce -> unreproducible (cannot reproduce)
  - id: "reproduce-to-unreproducible"
    from: "reproduce"
    to: "unreproducible"
    condition:
      type: "phrase"
      phrases:
        - "bug not reproducible"
    priority: 2

  # classify -> strategy-tests (serialization, logic)
  - id: "classify-to-strategy-tests"
    from: "classify"
    to: "strategy-tests"
    condition:
      type: "phrase"
      phrases:
        - "serialization bug"
        - "logic bug"
    priority: 1

  # classify -> strategy-flowtrace (performance, integration)
  - id: "classify-to-strategy-flowtrace"
    from: "classify"
    to: "strategy-flowtrace"
    condition:
      type: "phrase"
      phrases:
        - "performance bug"
        - "integration bug"
    priority: 1

  # classify -> strategy-hybrid (concurrency, memory)
  - id: "classify-to-strategy-hybrid"
    from: "classify"
    to: "strategy-hybrid"
    condition:
      type: "phrase"
      phrases:
        - "concurrency bug"
        - "memory bug"
    priority: 1

  # strategy-tests -> analyze
  - id: "strategy-tests-to-analyze"
    from: "strategy-tests"
    to: "analyze"
    condition:
      type: "phrase"
      phrases:
        - "observations collected"
    priority: 1

  # strategy-flowtrace -> analyze
  - id: "strategy-flowtrace-to-analyze"
    from: "strategy-flowtrace"
    to: "analyze"
    condition:
      type: "phrase"
      phrases:
        - "observations collected"
    priority: 1

  # strategy-hybrid -> analyze
  - id: "strategy-hybrid-to-analyze"
    from: "strategy-hybrid"
    to: "analyze"
    condition:
      type: "phrase"
      phrases:
        - "observations collected"
    priority: 1

  # analyze -> hypothesize
  - id: "analyze-to-hypothesize"
    from: "analyze"
    to: "hypothesize"
    condition:
      type: "phrase"
      phrases:
        - "analysis complete"
    priority: 1

  # hypothesize -> fix
  - id: "hypothesize-to-fix"
    from: "hypothesize"
    to: "fix"
    condition:
      type: "phrase"
      phrases:
        - "hypothesis formed"
    priority: 1

  # hypothesize -> analyze (need more data)
  - id: "hypothesize-to-analyze"
    from: "hypothesize"
    to: "analyze"
    condition:
      type: "phrase"
      phrases:
        - "need more data"
    priority: 2

  # fix -> verify
  - id: "fix-to-verify"
    from: "fix"
    to: "verify"
    condition:
      type: "phrase"
      phrases:
        - "fix implemented"
    priority: 1

  # verify -> report (success)
  - id: "verify-to-report"
    from: "verify"
    to: "report"
    condition:
      type: "phrase"
      phrases:
        - "verification passed"
    priority: 1

  # verify -> hypothesize (failure loop)
  - id: "verify-to-hypothesize"
    from: "verify"
    to: "hypothesize"
    condition:
      type: "phrase"
      phrases:
        - "verification failed"
    priority: 2
