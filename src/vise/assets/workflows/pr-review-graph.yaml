metadata:
  name: "PR Review"
  description: "3-phase pull request review: fetch context, analyze changes, post structured comments."
  version: "1.0.0"
  type: "graph"
  author: "vise"

nodes:
  - id: "fetch"
    name: "Fetch"
    is_start: true
    prompt_injection: |
      PHASE: FETCH
      Gather all context needed to review the PR. Read-only.
      1. Read the PR description and linked issue (if any).
      2. Inspect changed files: git diff main...HEAD or gh pr diff.
      3. Note the scope: what modules are touched, what tests exist.
      Signal: say "context fetched" when you have a complete picture.

  - id: "analyze"
    name: "Analyze"
    prompt_injection: |
      PHASE: ANALYZE
      Systematically evaluate the changes.
      1. Correctness: does the logic match the intent?
      2. Security: any injection, auth bypass, or data exposure risks?
      3. Performance: N+1 queries, unbounded loops, missing indexes?
      4. Tests: are edge cases covered? are mocks realistic?
      5. Conventions: naming, error handling, type hints match the codebase?
      Signal: say "analysis complete" when all dimensions are covered.

  - id: "comment"
    name: "Comment"
    is_end: true
    prompt_injection: |
      PHASE: COMMENT
      Produce a structured review report.
      Format each finding as:
        [SEVERITY] file:line — description — suggestion
      Severities: BLOCKING | MAJOR | MINOR | NIT
      End with a summary: Approve / Request Changes / Needs Discussion.
      Signal: review posted — workflow complete.

edges:
  - id: "fetch-to-analyze"
    from: "fetch"
    to: "analyze"
    condition:
      type: "phrase"
      phrases:
        - "context fetched"
        - "next phase"
        - "advance"

  - id: "analyze-to-comment"
    from: "analyze"
    to: "comment"
    condition:
      type: "phrase"
      phrases:
        - "analysis complete"
        - "next phase"
        - "advance"
