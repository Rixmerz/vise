metadata:
  name: "Sprint E2E"
  description: "Multi-surface vertical-slice sprint with contract-first delivery and live-server E2E validation. Use when a /sprint touches >=2 service surfaces (backend + frontend, service + service)."
  version: "1.0.0"
  type: "graph"
  author: "vise"

nodes:
  - id: "orient"
    name: "Orient"
    is_start: true
    prompt_injection: |
      PHASE: ORIENT
      Read-only exploration of the multi-surface scope.
      1. List the service surfaces involved (backend, frontend, mcp, migrations).
      2. Read any existing files under contracts/ for the feature.
      3. Run experience_query for prior contract-drift incidents on this project.
      4. State the deliverable in one sentence and enumerate the surfaces it crosses.
      Signal: say "oriented" when ready to publish the contract.

  - id: "contract"
    name: "Contract"
    prompt_injection: |
      PHASE: CONTRACT
      Produce a single source-of-truth wire contract BEFORE any implementation
      agent dispatches. This phase exists because parallel backend+frontend
      waves drift on request shape (the pharma-MVP 422: backend
      OAuth2PasswordRequestForm form-data vs frontend JSON body).
      1. Write contracts/<feature>.openapi.yaml: every endpoint touched
         with method, path, EXACT request Content-Type
         (application/x-www-form-urlencoded vs application/json matters),
         required fields, response schema, error envelopes (401 vs 403 vs 422).
      2. Generate frontend/src/types/api/<feature>.ts. Prefer
         openapi-typescript when available; otherwise hand-write interfaces
         mirroring the yaml verbatim.
      3. Write contracts/<feature>.contract.md cheat-sheet: one row per
         endpoint with a curl example showing the exact wire format. This is
         what the implementation agents read before coding.
      Acceptance: yaml validates (redocly lint or openapi-cli), TS types
      compile, cheat-sheet committed.
      Signal: say "contract published" when all three artifacts exist.

  - id: "implement"
    name: "Implement"
    prompt_injection: |
      PHASE: IMPLEMENT
      Dispatch backend and frontend agents in PARALLEL (run_in_background).
      Each agent's brief MUST include this clause verbatim:
        "Read contracts/<feature>.contract.md and contracts/<feature>.openapi.yaml
        BEFORE writing code. If the contract is wrong, return immediately
        without code changes — request a contract revision."
      Tests travel with implementation (unit + per-surface integration).
      Cross-surface tests do NOT live here — the next phase owns them.
      Files MUST NOT collide between sibling agents.
      Signal: say "implementation done" when every dispatched agent returned green.

  - id: "e2e"
    name: "E2E"
    tools_blocked:
      - "Edit"
      - "Write"
      - "NotebookEdit"
    prompt_injection: |
      PHASE: E2E
      Single tester agent. Read-only verification of cross-surface contract.
      Setup:
      1. Start live backend in background (uvicorn / fastapi dev / npm run
         server / project default). Capture PID.
      2. Start live frontend in background (npm run dev / vite). Capture PID.
      3. Register teardown (SIGTERM then SIGKILL after 5s).
      Tooling priority:
        - Real browser (Playwright or Cypress) is MANDATORY for any flow
          touching auth, cookies (Secure/SameSite/HttpOnly), CSRF,
          OAuth/OIDC redirects, cross-origin requests, file
          upload/download, or service workers. NO httpx fallback for
          these. If the dep is missing, INSTALL it
          (`npm i -D @playwright/test && npx playwright install chromium`)
          rather than degrading to an in-process mock.
        - httpx + pytest replaying the frontend's actual fetch/axios
          call shape is permitted ONLY for pure JSON RPC flows with no
          browser-only behavior (no cookies, no redirects, no CORS).
      MANDATORY flows:
        (a) login happy-path -> 200, token returned, NO 422. MUST run in
            a real browser; assert cookie set, navigation completed, no
            console errors, no network 4xx/5xx other than expected.
        (b) login wrong-password -> 401. A 422 here is contract drift.
        (c) RBAC negative -> non-admin hits admin route -> 403.
        (d) primary domain flow (list + create on the feature's main entity).
      Common silent failures (assert against each on auth/redirect flows):
        - Cookie dropped because backend set `Secure` on http://localhost.
        - CORS preflight rejected (no Access-Control-Allow-Origin match).
        - Redirect loop between /login and /dashboard from stale token.
        - Missing same-origin proxy -> fetch hits wrong origin silently.
        - Fetch error swallowed by frontend -> page resets with no toast.
      Validation step: diff observed request Content-Type and body against
      contracts/<feature>.openapi.yaml. Mismatch = FAIL.
      Failure semantics: BLOCK traversal to validate. Dispatch fixer against
      the contract artifact, never against a silo in isolation.
      Signal: say "e2e green" only after all four flows pass.

  - id: "validate"
    name: "Validate"
    tools_blocked:
      - "Edit"
      - "Write"
      - "NotebookEdit"
    prompt_injection: |
      PHASE: VALIDATE
      Single reviewer agent. Read-only project check pipeline.
      1. Build (npm run build, cargo check, pytest --collect-only, etc).
      2. Lint (ruff, eslint, clippy).
      3. Type check (mypy, tsc --noEmit).
      4. Full test suite (pytest, npm test, cargo test).
      MUST NOT run until e2e has signalled "e2e green" — the previous edge
      enforces it.
      Signal: say "validation green" when every step passes.

  - id: "close"
    name: "Close"
    is_end: true
    prompt_injection: |
      PHASE: CLOSE
      Capture continuity and emit summary.
      1. Call next_task_record(summary=<final>, task_description=<original>,
         files_changed=[<paths>]).
      2. Call experience_record on contracts/<feature>.openapi.yaml with
         event_type=feature_shipped and a Why line describing the contract
         drift class avoided.
      3. Summarize for the user (3-5 sentences): deliverable, surfaces,
         contract file, E2E result.
      Signal: workflow complete.

edges:
  - id: "orient-to-contract"
    from: "orient"
    to: "contract"
    condition:
      type: "phrase"
      phrases:
        - "oriented"
        - "next phase"
        - "advance"

  - id: "contract-to-implement"
    from: "contract"
    to: "implement"
    condition:
      type: "phrase"
      phrases:
        - "contract published"
        - "next phase"
        - "advance"

  - id: "implement-to-e2e"
    from: "implement"
    to: "e2e"
    condition:
      type: "phrase"
      phrases:
        - "implementation done"
        - "next phase"
        - "advance"

  - id: "e2e-to-validate"
    from: "e2e"
    to: "validate"
    condition:
      type: "phrase"
      phrases:
        - "e2e green"
        - "next phase"
        - "advance"

  - id: "validate-to-close"
    from: "validate"
    to: "close"
    condition:
      type: "phrase"
      phrases:
        - "validation green"
        - "next phase"
        - "advance"
